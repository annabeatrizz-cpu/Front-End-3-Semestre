<!DOCTYPE html>
<html lang="pt_BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <div class="container container--flex-column">

            <img class="header__logo" src="./images/logotipo.img.svg" alt="">

            <h1 class="header__title">Contact Form</h1>

            <p class="header__text">Insira os dados do contato e clique em cadastrar!</p>

        </div>
    </header>
    <main>
        <div class="container">
            <form class="contact-form" action="">
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--metade" name="nome" id="nome"
                            placeholder="Nome" type="text">

                        <input class="contact-form__input contact-form__input--metade" name="sobrenome" id="sobrenome"
                            placeholder="Sobrenome" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="email">Email</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--inteiro" name="email" id="email"
                            placeholder="ex:fulano@email.com" type="text">
                    </div>
                </div>


                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Telefone">Telefone</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="+55" id="numero"
                            placeholder="+55" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="ddd" id="ddd"
                            placeholder="ddd" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="ex:99999-9999" id="telefone"
                            placeholder="ex:99999-9999" type="text">
                    </div>
                </div>


                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço">Endereço</label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--quarto" name="cep:" id="cep"
                            placeholder="cep" type="text">

                        <input class="contact-form__input contact-form__input--metade" name="Rua la de casa"
                            id="RuaLaDeCasa" placeholder="Rua la de casa" type="text">

                        <input class="contact-form__input contact-form__input--quarto" name="ex:555" id="ex"
                            placeholder="ex:555" type="number">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço"></label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="Apto X bloco X"
                            id="AptoXblocoX" placeholder="Apto X bloco X" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="Bairro" id="Bairro"
                            placeholder="Bairro" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="Cidade" id="Cidade"
                            placeholder="Cidade " type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço"></label>
                    </div>

                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="Estado" id="Estado"
                            placeholder="Estado" type="text">
                    </div>
                </div>


                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Anotações">Anotações</label>
                    </div>

                    <div class="contact-form__col-b">
                        <textarea class="contact-form__input contact-form__input--inteiro contact-form__textarea"
                            name="Anotações" id="Anotações" placeholder="Suas anotações aqui"></textarea>
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                    </div>

                    <div class="contact-form__col-b">
                        <button type="button" id="Cadastrar" name="Cadastrar"
                            class="contact-form__button contact-form__input--metade" onclick="minhaFuncao();;">Cadastrar
                        </button>

                        <button type="reset" id="Limpar" name="Limpar"
                            class=" contact-form__button contact-form__input--metade">Limpar
                        </button>

                    </div>
                </div>

            </form>
        </div>
    </main>

    <script>
        function minhaFuncao() {
            let nome = document.getElementById("nome").value.trim();
            let sobrenome = document.getElementById("sobrenome").value.trim();
            let email = document.getElementById("email").value.trim();
            let ddd = document.getElementById("ddd").value.trim();
            let telefone = document.getElementById("telefone").value.trim();
            let cep = document.getElementById("cep").value.trim();
            let RuaLaDeCasa = document.getElementById("RuaLaDeCasa").value.trim();
            let ex = document.getElementById("ex").value.trim();
            let AptoXblocoX = document.getElementById("AptoXblocoX").value.trim();
            let Bairro = document.getElementById("Bairro").value.trim();
            let Cidade = document.getElementById("Cidade").value.trim();
            let Estado = document.getElementById("Estado").value.trim();
            let Anotações = document.getElementById("Anotações").value.trim();

            if (nome.length == 0) {
                formError("nome");

            } else {
                reiniciaBorda("nome");
            }

            if (sobrenome.length == 0) {
                formError("sobrenome");

            } else {
                reiniciaBorda("sobrenome");
            }

            if (sobrenome.length == 0) {
                formError("email");

            } else {
                reiniciaBorda("email");
            }

            if (sobrenome.length == 0) {
                formError("numero");

            } else {
                reiniciaBorda("numero");
            }
            if (sobrenome.length == 0) {
                formError("ddd");

            } else {
                reiniciaBorda("ddd");
            }
            if (sobrenome.length == 0) {
                formError("telefone");

            } else {
                reiniciaBorda("telefone");
            }
            if (sobrenome.length == 0) {
                formError("cep");

            } else {
                reiniciaBorda("cep");
            }

            if (sobrenome.length == 0) {
                formError("RuaLaDeCasa");

            } else {
                reiniciaBorda("RuaLaDeCasa");
            }

            if (sobrenome.length == 0) {
                formError("ex");

            } else {
                reiniciaBorda("ex");
            }

            if (sobrenome.length == 0) {
                formError("AptoXblocoX");

            } else {
                reiniciaBorda("AptoXblocoX");
            }

            if (sobrenome.length == 0) {
                formError("Bairro");

            } else {
                reiniciaBorda("Bairro");
            }

            if (sobrenome.length == 0) {
                formError("Cidade");

            } else {
                reiniciaBorda("Cidade");
            }
            if (sobrenome.length == 0) {
                formError("Estado");

            } else {
                reiniciaBorda("Estado");
            }
            if (sobrenome.length == 0) {
                formError("Anotações");

            } else {
                reiniciaBorda("Anotações");
            }


            function formError(fildId) {
                document.getElementById(fildId).style.border = "1px solid red"
            }

            function reiniciaBorda(fildId) {
                document.getElementById(fildId).style.border = "none"
            }

            // console.log(`
            // Aluno: ${nome} ${sobrenome} |
            // Email: ${email} |
            // `);
        }//fim da funcao
    </script>


</body>

</html>
