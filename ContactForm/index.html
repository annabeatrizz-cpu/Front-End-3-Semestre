<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="header">
        <div class="container container--flex--column">
            <img class="header__logo" src="./images/logotipo.img.svg" alt="">



            <h1 class="header__title">Contact Form</h1>
            <p class="header__text">Insira os dados do contato e clique em cadstrar</p>
        </div>
    </header>
    <main>
        <div class="container">
            <form class="contact-form" action="">
                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="nome">Nome</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--metade" name="nome" id="nome"
                            placeholder="Nome" type="text">

                        <input class="contact-form__input contact-form__input--metade" name="sobrenome" id="sobrenome"
                            placeholder="sobrenome" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="email">E-mail</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--inteiro" name="Email" id="Email"
                            placeholder="Email" type="text">
                    </div>
                </div>



                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Telefone">Telefone</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="+55" id="+55"
                            placeholder="+55" type="text">

                            <input class="contact-form__input contact-form__input--terco" name="DDD" id="DDD"
                            placeholder="DDD" type="text">


                            <input class="contact-form__input contact-form__input--terco" name="ex: 99999-9999" id="ex: 99999-9999"
                            placeholder="ex: 99999-9999" type="text">
                    </div>
                </div>

                <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for="Endereço">Endereço</label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--meio" name="cep: 99999-9999" id="cep: 99999-9999"
                            placeholder="cep: 99999-9999" type="text">

                            <input class="contact-form__input contact-form__input--quarto" name="Rua La De Casa" id="Rua La De Casa"
                            placeholder="Rua La De Casa" type="text">

                            <input class="contact-form__input contact-form__input--meio" name="ex: 555" id="ex: 555"
                            placeholder="ex: 555" type="text">
                    </div>
                </div>

                 <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for=""></label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="Apto 12 Bloco x" id="Apto 12 Bloco x"
                            placeholder="Apto 12 Bloco x" type="text">

                        <input class="contact-form__input contact-form__input--meio" name="Bairro" id="Bairro"
                            placeholder="Bairro" type="text">

                        <input class="contact-form__input contact-form__input--terco" name="Cidade" id="Cidade"
                            placeholder="Cidade" type="text">
                    </div>
                </div>

                   <div class="contact-form__linha">
                    <div class="contact-form__col-a">
                        <label class="contact-form__label" for=""></label>
                    </div>
                    <div class="contact-form__col-b">
                        <input class="contact-form__input contact-form__input--terco" name="Estado" id="Estado"
                            placeholder="Estado" type="text">
                    </div>
                </div>

                   
                
                 <div class="contact-form__linha">

                    <div class="contact-form__col-a contact-form__col-a--label-topo">
                        <label class="contact-form__label" for="anotacoes">Anotações</label>
                    </div>

                    <div class="contact-form__col-b">
                        <textarea class="contact-form__input contact-form__input--tamanho3" name="anotacoes" id="anotacoes" placeholder="Digite suas anotações"></textarea>
                    </div>

                </div>      

            </form>

            <article class="contact-button">
                <button class="contact-button__cadastro" type="submit">Cadastrar</button>
                <button class="contact-button__entrar" type="submit">Entrar</button>
            </article>

                
                 
                </div>

              
             </div>
         </form>
    </main>
</body>

</html>
